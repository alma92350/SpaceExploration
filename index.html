<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stellar Frontier — Space Exploration</title>
<link rel="stylesheet" href="style.css?v=2.106.1" />
</head>
<body>
  <div id="app">
    <!-- ===== Top status bar ===== -->
    <header id="topbar">
      <div class="brand">
        <span class="logo">✦</span>
        <span class="title">STELLAR FRONTIER</span>
      </div>
      <div id="resources" class="resources"></div>
      <div class="turn-box">
        <div class="turn-label">CYCLE</div>
        <div id="turn" class="turn-value">1</div>
        <button id="endTurnBtn" class="btn btn-turn" title="Advance one cycle">End Cycle ▸</button>
        <div id="saveIndicator" class="save-indicator" aria-hidden="true">💾 Saved</div>
      </div>
    </header>

    <!-- ===== Main layout ===== -->
    <main id="main">
      <!-- Left: navigation + ship -->
      <aside id="sidebar">
        <nav id="tabs">
          <button class="tab active" data-tab="galaxy">🪐 Galaxy</button>
          <button class="tab" data-tab="market">💱 Market</button>
          <button class="tab" data-tab="ship">🚀 Ship</button>
          <button class="tab" data-tab="missions">🎯 Missions</button>
          <button class="tab" data-tab="research">🔬 Research</button>
          <button class="tab" data-tab="industry">🏭 Industry</button>
          <button class="tab" data-tab="fortunes">✨ Fortunes</button>
          <button class="tab" data-tab="raid">⚔️ Raider</button>
          <button class="tab" data-tab="escort">🛡️ Escort</button>
          <button class="tab" data-tab="contacts">🏴‍☠️ Contacts</button>
          <button class="tab" data-tab="bases">🏗️ Bases</button>
          <button class="tab" data-tab="politics">🏛️ Politics</button>
          <button class="tab" data-tab="colonies">🌍 Colonies</button>
          <button class="tab" data-tab="fleet">✦ Fleet</button>
        </nav>

        <div class="ship-panel">
          <h3>Your Vessel</h3>
          <div id="shipName" class="ship-name">S.S. Wanderer</div>
          <div id="shipStats" class="ship-stats"></div>
          <div class="location">
            <span class="loc-label">Docked at</span>
            <span id="currentPlanet" class="loc-value">—</span>
          </div>
        </div>

        <div id="opsPanel" class="ops-panel"></div>

        <div class="game-menu">
          <h3>Captain's Console</h3>
          <div id="gameMenu" class="game-menu-buttons"></div>
        </div>
      </aside>

      <!-- Right: tab content -->
      <section id="content">
        <div id="panel-galaxy" class="panel"></div>
        <div id="panel-market" class="panel hidden"></div>
        <div id="panel-industry" class="panel hidden"></div>
        <div id="panel-fortunes" class="panel hidden"></div>
        <div id="panel-research" class="panel hidden"></div>
        <div id="panel-missions" class="panel hidden"></div>
        <div id="panel-politics" class="panel hidden"></div>
        <div id="panel-bases" class="panel hidden"></div>
        <div id="panel-colonies" class="panel hidden"></div>
        <div id="panel-fleet" class="panel hidden"></div>
        <div id="panel-raid" class="panel hidden"></div>
        <div id="panel-escort" class="panel hidden"></div>
        <div id="panel-contacts" class="panel hidden"></div>
        <div id="panel-ship" class="panel hidden"></div>
      </section>
    </main>

    <!-- ===== Event log ===== -->
    <footer id="logbar">
      <div class="log-header">📡 Ship Log</div>
      <div id="log" class="log" role="log" aria-live="polite"></div>
    </footer>
  </div>

  <!-- Celebration overlays -->
  <canvas id="fx"></canvas>
  <div id="announce" class="announce hidden"></div>

  <!-- Toast notifications -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <script src="data.js?v=2.106.1"></script>
  <script src="galaxygen.js?v=2.106.1"></script>
  <script src="catalogs.js?v=2.106.1"></script>
  <script src="crises.js?v=2.106.1"></script>
  <script src="state.js?v=2.106.1"></script>
  <script src="pricing.js?v=2.106.1"></script>
  <script src="feedback.js?v=2.106.1"></script>
  <script src="resources.js?v=2.106.1"></script>
  <script src="combat.js?v=2.106.1"></script>
  <script src="pirateBands.js?v=2.106.1"></script>
  <script src="pirateChat.js?v=2.106.1"></script>
  <script src="raiding.js?v=2.106.1"></script>
  <script src="sector4x.js?v=2.106.1"></script>
  <script src="outlaw.js?v=2.106.1"></script>
  <script src="politics.js?v=2.106.1"></script>
  <script src="economy.js?v=2.106.1"></script>
  <script src="colonization.js?v=2.106.1"></script>
  <script src="fleet.js?v=2.106.1"></script>
  <script src="fortunes.js?v=2.106.1"></script>
  <script src="frontier.js?v=2.106.1"></script>
  <script src="mandates.js?v=2.106.1"></script>
  <script src="escort.js?v=2.106.1"></script>
  <script src="renderCore.js?v=2.106.1"></script>
  <script src="renderProgression.js?v=2.106.1"></script>
  <script src="renderCombat.js?v=2.106.1"></script>
  <script src="renderSettlement.js?v=2.106.1"></script>
  <script src="renderFleetFortunes.js?v=2.106.1"></script>
  <script src="persistence.js?v=2.106.1"></script>
  <script src="game.js?v=2.106.1"></script>
</body>
</html>
